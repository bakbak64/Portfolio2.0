<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Aditya Srivastava - Embedded Systems Engineer & Full-Stack Developer. Bridging bare-metal drivers with AI-powered platforms." />
    <meta property="og:title" content="Aditya Srivastava - Developer Portfolio" />
    <meta property="og:description" content="Embedded Systems Engineer & Full-Stack Developer. Bridging bare-metal drivers with AI-powered platforms." />
    <meta property="og:type" content="website" />
    <title>Aditya Srivastava - Developer Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Ambient Background Layers -->
    <div class="bg-grid" aria-hidden="true"></div>
    <svg class="bg-traces" id="bgTraces" aria-hidden="true" viewBox="0 0 1440 1000" preserveAspectRatio="xMidYMin slice">
      <!-- Top-left corner rectangle -->
      <rect x="20" y="20" width="180" height="130" fill="none" stroke="currentColor" stroke-width="1.5" />
      
      <!-- Top-right corner rectangle -->
      <rect x="1240" y="40" width="180" height="140" fill="none" stroke="currentColor" stroke-width="1.5" />
      
      <!-- Left side vertical trace -->
      <path d="M50 200 V600" stroke="currentColor" stroke-width="1.5" fill="none" />
      <circle cx="50" cy="200" r="4"></circle>
      <circle cx="50" cy="600" r="4"></circle>
      
      <!-- Right side vertical trace -->
      <path d="M1390 250 V650" stroke="currentColor" stroke-width="1.5" fill="none" />
      <circle cx="1390" cy="250" r="4"></circle>
      <circle cx="1390" cy="650" r="4"></circle>
      
      <!-- Bottom-left rectangle -->
      <rect x="30" y="750" width="150" height="170" fill="none" stroke="currentColor" stroke-width="1.5" />
      
      <!-- Bottom-right rectangle -->
      <rect x="1260" y="800" width="150" height="150" fill="none" stroke="currentColor" stroke-width="1.5" />
      
      <!-- Center decorative rectangle -->
      <rect x="600" y="100" width="100" height="100" fill="none" stroke="currentColor" stroke-width="1.5" />
      <circle cx="600" cy="100" r="4"></circle>
      <circle cx="700" cy="100" r="4"></circle>
      <circle cx="700" cy="200" r="4"></circle>
      <circle cx="600" cy="200" r="4"></circle>
      
      <!-- Right center vertical trace -->
      <path d="M800 150 V350" stroke="currentColor" stroke-width="1.5" fill="none" />
      <circle cx="800" cy="150" r="4"></circle>
      <circle cx="800" cy="350" r="4"></circle>
    </svg>

    <div id="root"></div>
    
    <!-- Circuit Background Parallax Script -->
    <script>
      (function() {
        const layer = document.getElementById('bgTraces');
        if (!layer) return;

        // Parallax effect on mouse move
        window.addEventListener('mousemove', (e) => {
          const nx = (e.clientX / window.innerWidth - 0.5);
          const ny = (e.clientY / window.innerHeight - 0.5);
          layer.style.transform = `translate(${nx * 15}px, ${ny * 15}px)`;
        });

        // Parallax effect on scroll
        window.addEventListener('scroll', () => {
          const s = window.scrollY * 0.05;
          layer.style.transform = `translateY(${-s}px)`;
        }, { passive: true });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
